            </div>
            <p className="text-sm text-gray-600 mb-4">{report.description}</p>
            <button className="w-full bg-rose-600 hover:bg-rose-700 text-white px-4 py-2 rounded-lg transition font-medium text-sm">
              Generate Report
            </button>
          </div>
        ))}
      </div>

      {selectedReport && (
        <div className="bg-white border border-gray-200 rounded-lg shadow-sm">
          <div className="p-6 border-b border-gray-200 flex justify-between items-center">
            <div>
              <h3 className="text-lg font-semibold text-gray-900">{selectedReport.name}</h3>
              <p className="text-sm text-gray-600 mt-1">Report ID: {selectedReport.id}</p>
            </div>
            <button onClick={() => setSelectedReport(null)} className="text-gray-400 hover:text-gray-600">
              <X className="w-6 h-6" />
            </button>
          </div>
          <div className="p-6">
            <p className="text-gray-600 mb-6">{selectedReport.description}</p>
            <div className="bg-gray-50 rounded-lg p-6 mb-6">
              <p className="text-center text-gray-600 py-8">Report preview will be displayed here</p>
            </div>
            <div className="flex gap-3">
              <button className="flex-1 flex items-center justify-center gap-2 bg-rose-600 hover:bg-rose-700 text-white px-4 py-3 rounded-lg transition font-medium">
                <Download className="w-4 h-4" /> Download PDF
              </button>
              <button className="flex-1 flex items-center justify-center gap-2 border border-gray-300 hover:bg-gray-50 text-gray-700 px-4 py-3 rounded-lg transition font-medium">
                <FileText className="w-4 h-4" /> View Details
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );

  return (
    <div className="flex h-screen bg-white">
      <div className={`${sidebarOpen ? 'w-64' : 'w-20'} bg-white border-r border-gray-200 transition-all duration-300 flex flex-col`}>
        <div className="h-16 flex items-center justify-between px-4 border-b border-gray-200">
          {sidebarOpen && <h1 className="text-lg font-bold text-gray-900">WYC 2026</h1>}
          <button onClick={() => setSidebarOpen(!sidebarOpen)} className="text-gray-600 hover:text-gray-900">
            {sidebarOpen ? <X className="w-5 h-5" /> : <Menu className="w-5 h-5" />}
          </button>
        </div>

        <nav className="flex-1 overflow-y-auto py-4">
          <div className="space-y-2 px-3">
            {menuItems.map((item) => {
              const Icon = item.icon;
              return (
                <button
                  key={item.id}
                  onClick={() => setActiveMenu(item.id)}
                  className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition ${
                    activeMenu === item.id
                      ? 'bg-rose-50 text-rose-600 border border-rose-200'
                      : 'text-gray-700 hover:bg-gray-50'
                  }`}
                >
                  <Icon className="w-5 h-5 flex-shrink-0" />
                  {sidebarOpen && <span className="text-sm font-medium">{item.label}</span>}
                </button>
              );
            })}
          </div>
        </nav>

        <div className="border-t border-gray-200 p-4">
          <div className={`flex items-center ${sidebarOpen ? 'gap-3' : 'justify-center'}`}>
            <div className="w-10 h-10 rounded-full bg-rose-100 flex items-center justify-center flex-shrink-0">
              <User className="w-5 h-5 text-rose-600" />
            </div>
            {sidebarOpen && (
              <button className="text-gray-600 hover:text-gray-900">
                <LogOut className="w-5 h-5" />
              </button>
            )}
          </div>
        </div>
      </div>

      <div className="flex-1 flex flex-col overflow-hidden">
        <div className="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8">
          <div className="flex items-center gap-4">
            <Bell className="w-5 h-5 text-gray-600 cursor-pointer hover:text-gray-900" />
            <Settings className="w-5 h-5 text-gray-600 cursor-pointer hover:text-gray-900" />
          </div>
        </div>

        <div className="flex-1 overflow-auto bg-white">
          <div className="p-8">
            {activeMenu === 'home' && renderHome()}
            {activeMenu === 'users' && renderUsers()}
            {activeMenu === 'config' && renderConfig()}
            {activeMenu === 'integration' && renderIntegration()}
            {activeMenu === 'audit' && renderAudit()}
            {activeMenu === 'search' && renderSearch()}
            {activeMenu === 'support' && renderSupport()}
            {activeMenu === 'reports' && renderReports()}
          </div>
        </div>
      </div>
    </div>
  );
}
        
        // Render the component
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(WYC2026AdminPanel));
    </script>
</body>
</html>
